services:
  agtsmith-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: agtsmith-ui:local
    container_name: agtsmith-ui
    working_dir: /app
    user: "${AGTSMITH_UID:-1000}:${AGTSMITH_GID:-1000}"
    command: ["python", "scripts/web_ui_server.py", "--host", "0.0.0.0", "--port", "8787"]
    env_file:
      - config/ui.env
    ports:
      - "${AGTSMITH_UI_PORT:-8787}:8787"
    volumes:
      - ./:/app
    restart: unless-stopped
