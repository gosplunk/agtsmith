services:
  agtsmith-ui-deploy:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: agtsmith-ui-deploy:local
    container_name: agtsmith-ui-deploy
    ports:
      - "${AGTSMITH_DEPLOY_PORT:-8787}:8787"
    volumes:
      - agtsmith_deploy_config:/app/config
      - agtsmith_deploy_artifacts:/app/artifacts
    restart: unless-stopped

volumes:
  agtsmith_deploy_config:
  agtsmith_deploy_artifacts:
